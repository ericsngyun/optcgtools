name: Material pipeline

on:
  push:
    branches: [holo-lab]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: material-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python capture pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install project
        run: uv sync --group dev

      - name: Lint
        id: lint
        continue-on-error: true
        run: uv run ruff check src tests --output-format=json > ruff-report.json

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ruff-report-${{ github.run_id }}
          path: ruff-report.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce lint result
        if: steps.lint.outcome == 'failure'
        run: |
          uv run ruff check src tests
          exit 1

      - name: Compile
        run: uv run python -m compileall -q src tests

      - name: Test
        run: uv run pytest --cov=optcg_material --cov-report=term-missing

  web:
    name: Holo lab web build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify upstream source pin
        run: npm run check:source-pin

      - name: Build
        run: npm run build
